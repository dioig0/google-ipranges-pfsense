name: Update Google IP ranges for pfSense

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependency
        run: pip install netaddr

      - name: Generate output files
        run: python generate_google_ranges.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/google-apis-defaultdomains-ipv4.txt output/google-apis-defaultdomains-ipv6.txt
          git diff --cached --quiet || git commit -m "Update Google IP ranges"
          git push
